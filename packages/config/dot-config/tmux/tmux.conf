set -sg history-file ~/.tmux_history
set -g history-limit 99999

#resurrect tests
set -g @resurrect-capture-pane-contents 'on'

# Initialize TMUX plugin manager.
# Keep this line at the very bottom of tmux.conf
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins"
run '/usr/share/tmux-plugin-manager/tpm'

# Mouse selection keybindings (must come after TPM to override tmux-yank)
# Keep selection after mouse drag ends
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Double-click to select word (works from normal mode)
bind-key -T root DoubleClick1Pane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "select-pane -t = \; copy-mode -H \; send-keys -X select-word \; send-keys -X copy-selection-no-clear"
bind-key -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; send-keys -X copy-selection-no-clear

# Triple-click to select line (works from normal mode)
bind-key -T root TripleClick1Pane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "select-pane -t = \; copy-mode -H \; send-keys -X select-line \; send-keys -X copy-selection-no-clear"
bind-key -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection-no-clear
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; send-keys -X copy-selection-no-clear

bind-key -n M-a run-shell "tmux capture-pane -pS -10000 | /home/anton/.local/bin/cmd-copyout"
