# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'

# Custom functions
#
# Copy last command output
# https://ianthehenry.com/posts/tmux-copy-last-command/


bind -n S-M-Up {
  copy-mode
  send -X clear-selection
  send -X start-of-line
  send -X start-of-line
  send -X cursor-up
  send -X start-of-line
  send -X start-of-line

  # Check if we're currently on a prompt line by looking for non-breaking space (\u00A0)
  if -F "#{m:*\u00A0*,#{copy_cursor_line}}" {
    # We're on a prompt line – mark everything above

    # Move to start of current prompt
    send -X start-of-line
    send -X start-of-line
    send -X begin-selection

    # Search backward to previous prompt (using non-breaking space as identifier)
    send -X search-backward-text "\u00A0"

    # Move to first line after the previous prompt (start of output)
    send -X cursor-down
    send -X start-of-line
    send -X start-of-line

    # Stop selection here
    send -X stop-selection

  } {
    # Fallback: mark from current position to previous prompt

    send -X end-of-line
    send -X end-of-line
    send -X begin-selection

    send -X search-backward-text "\u00A0"
    send -X cursor-down
    send -X start-of-line
    send -X start-of-line

    send -X stop-selection
  }
}

# Theme configuration
set -g @tokyo-night-tmux_theme storm    # storm | day | default to 'night'
set -g @tokyo-night-tmux_transparent 1  # 1 or 0
set -g @tokyo-night-tmux_pane_id_style hsquare
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 1
set -g @tokyo-night-tmux_netspeed_showip 1      # Display IPv4 address (default 0)
set -g @tokyo-night-tmux_netspeed_refresh 1     # Update interval in seconds (default 1)

# set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
# set -g @continuum-restore 'on'
set -g @continuum-save-interval '0'
set-option -g status-right '#h'
set-window-option -g mode-keys vi
set-option -g mouse on

# use 1 as first index because we are humans and not computers
set -g base-index 1
setw -g pane-base-index 1


