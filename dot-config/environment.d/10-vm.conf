# VM-specific environment variables

# No battery module
STATUSBAR_BATTERY=0

# Network interface for slstatus (common VM interface)
NET_INTERFACE=enp0s3

# VMs typically use different ethernet naming
# Adjust based on your VM provider:
# VirtualBox: enp0s3
# QEMU/KVM: ens3 or enp1s0
# VMware: ens33

# DO NOT degrade quality or animations in VMs
# VMs should feel identical to bare metal
