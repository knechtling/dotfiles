# Laptop-specific environment variables
# Only loaded on laptops (detected via /sys/class/power_supply/BAT0)

# Battery module for status bar
STATUSBAR_BATTERY=1

# Backlight device
BACKLIGHT_DEVICE=intel_backlight

# Wireless interface (adjust for your hardware)
WIFI_INTERFACE=wlan0

# Network interface for slstatus
NET_INTERFACE=wlan0

# Enable lid-close handling
LID_CLOSE_ACTION=suspend
